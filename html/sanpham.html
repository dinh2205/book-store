<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Chi tiết sản phẩm</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../css/stylesanpham.css">
    <script src="../js/liballSP.js"></script>

</head>

<body>
    <nav class="nav">

        <div class="nav-item">
            <a class="nav-link" href="../html/allsanpham.html">Sản phẩm</a>
        </div>

        <div class="nav-item">
            <a class="nav-link" href="#">Chi tiết sản phẩm</a>
        </div>

    </nav>

    <div class="container">

        <div class="img-box">
            <img id="p-image" src="../assets/imges/nenpage2.jpg" alt="">
        </div>

        <div class="desc-box">

            <h1 id="p-name">
                Tên sản phẩm
            </h1>

            <p id="p-price">
                Giá sản phẩm
            </p>

            <h4>Mô tả sản phẩm</h4>

            <p id="p-description">
                Mô tả sản phẩm
            </p>

            <button class="buy-btn">
                Mua Ngay
            </button>
        </div>

    </div>


    <script>

        // LẤY ID TRÊN URL
        const urlParams = new URLSearchParams(window.location.search);

        const productId = Number(urlParams.get("id"));


        // TÌM SÁCH
        const product = products.find(p => p.id === productId);


        // HIỂN THỊ DỮ LIỆU
        if (product) {

            document.getElementById("p-name").innerText = product.name;

            document.getElementById("p-price").innerText = product.price;

            document.getElementById("p-image").src = product.img;

            document.getElementById("p-description").innerText = product.desc;

        }

    </script>

</body>

</html>
